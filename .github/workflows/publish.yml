name: Publish to PyPI

# Publishes the package to PyPI whenever a GitHub Release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token/secret required.
# Setup once on PyPI: https://docs.pypi.org/trusted-publishers/
#   Publisher: GitHub Actions
#   Owner: malkreide
#   Repository: sbb-opendata-mcp
#   Workflow: publish.yml
#   Environment: pypi

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/sbb-opendata-mcp
    permissions:
      id-token: write  # required for OIDC trusted publishing
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
